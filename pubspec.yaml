name: omnisource
description: "A cross-platform media aggregator"# The following line prevents the package from being accidentally published to
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  # network and api
  dio: ^5.4.0
  retrofit: ^4.1.0
  # state management
  flutter_bloc: ^8.1.3
  # jwt token storage
  flutter_secure_storage: ^9.0.0
  # navigation
  go_router: ^13.2.0
  # fonts and icons
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.8
  # visual thinhs
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0 # loaders
  shimmer: ^3.0.0        # skeletons while loading



dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  retrofit_generator: ^8.1.0

flutter:
   uses-material-design: true

